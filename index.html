<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NixieGPT | Universal AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        #loading { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
        html.dark #loading { background: #0a0a0a; color: #fff; }
        .spinner { width: 45px; height: 45px; border: 3px solid #eee; border-left-color: #DC143C; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .nepal-title { color: #DC143C; -webkit-text-stroke: 0.5px #003893; text-shadow: 1.5px 1.5px 0px #003893; font-weight: 800; }
        .typing::after { content: '●'; animation: pulse 1s infinite; color: #3b82f6; margin-left: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #8884; border-radius: 10px; }
        .chat-bubble { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' };
        const savedSt = JSON.parse(localStorage.getItem('nixie_st'));
        if (savedSt?.dark !== false) document.documentElement.classList.add('dark');
    </script>
</head>
<body class="bg-gray-50 dark:bg-[#0d1117] text-gray-800 dark:text-gray-200 min-h-screen flex flex-col md:flex-row overflow-hidden">
    
    <div id="loading"><div class="spinner mb-4"></div><h2 class="nepal-title text-2xl tracking-tighter">NixieGPT</h2></div>

    <aside id="side" class="fixed md:sticky top-0 left-0 h-screen w-72 bg-white dark:bg-[#010409] border-r border-gray-200 dark:border-gray-800 z-50 transition-transform -translate-x-full md:translate-x-0 flex flex-col shadow-2xl">
        <div class="p-6 flex justify-between items-center border-b border-gray-100 dark:border-gray-800">
            <h1 class="text-2xl nepal-title">NixieGPT</h1>
            <button onclick="toggleSide()" class="md:hidden text-gray-500">✕</button>
        </div>
        <button onclick="newChat()" class="mx-4 mt-6 p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-blue-500/20 active:scale-95">+ New Conversation</button>
        <div id="history" class="flex-1 overflow-y-auto mt-4 px-3 space-y-1 pb-4"></div>
        <div class="p-4 border-t border-gray-200 dark:border-gray-800 grid grid-cols-2 gap-2">
            <button onclick="openSet()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-lg text-sm hover:brightness-110 transition">Settings</button>
            <button id="themeBtn" onclick="toggleDark()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-lg hover:brightness-110 transition">🌙 Dark</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="p-4 border-b border-gray-200 dark:border-gray-800 md:hidden flex justify-between items-center bg-white dark:bg-[#0d1117]">
            <button onclick="toggleSide()" class="text-2xl">☰</button>
            <h1 class="nepal-title text-xl">NixieGPT</h1>
            <div class="w-8"></div>
        </header>

        <div id="chat" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 scroll-smooth">
            <div id="welcome" class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-60">
                <div class="w-20 h-20 border-4 border-blue-500 rounded-full flex items-center justify-center text-3xl font-black text-blue-500">N</div>
                <h2 class="text-2xl font-bold">How can I help you today?</h2>
                <p class="max-w-md text-sm">Enter your OpenRouter API key in settings to start chatting with DeepSeek, Gemini, or Llama models.</p>
            </div>
        </div>

        <div class="w-full p-4 md:p-6 bg-gradient-to-t from-gray-50 dark:from-[#0d1117] via-gray-50 dark:via-[#0d1117] to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-red-600 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition duration-1000"></div>
                <div class="relative flex flex-col gap-2 bg-white dark:bg-[#161b22] p-2 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-xl">
                    <textarea id="input" rows="1" oninput="autoResize(this)" class="w-full p-3 bg-transparent outline-none resize-none max-h-48 text-lg" placeholder="Message NixieGPT..."></textarea>
                    <div class="flex justify-between items-center px-2 pb-1">
                        <span id="modelBadge" class="text-[10px] uppercase tracking-widest opacity-50 font-bold"></span>
                        <button id="sendBtn" onclick="send()" class="bg-blue-600 hover:bg-blue-700 text-white p-2 px-5 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 font-bold">
                            <span>Send</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            <p class="text-[10px] text-center mt-3 opacity-40 uppercase tracking-widest">Powered by OpenRouter & Nixie Automation</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#161b22] p-8 rounded-3xl w-full max-w-lg shadow-2xl border border-gray-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Configuration</h2>
                <button onclick="closeSet()" class="text-xl">✕</button>
            </div>
            <label class="block text-xs font-bold uppercase mb-2 opacity-60 tracking-wider">OpenRouter API Key</label>
            <input id="key" type="password" placeholder="sk-or-v1-..." class="w-full p-4 mb-5 border rounded-2xl dark:bg-[#0d1117] border-gray-700 focus:border-blue-500 outline-none transition">
            
            <label class="block text-xs font-bold uppercase mb-2 opacity-60 tracking-wider">AI Model ID</label>
            <input id="mod" type="text" placeholder="google/gemini-2.0-flash-001" class="w-full p-4 mb-5 border rounded-2xl dark:bg-[#0d1117] border-gray-700 focus:border-blue-500 outline-none transition">
            
            <label class="block text-xs font-bold uppercase mb-2 opacity-60 tracking-wider">System Instructions</label>
            <textarea id="sys" placeholder="You are a helpful assistant..." class="w-full p-4 mb-6 border rounded-2xl dark:bg-[#0d1117] border-gray-700 h-28 focus:border-blue-500 outline-none transition"></textarea>
            
            <button onclick="saveSet()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/30 transition-all active:scale-95">Save Changes</button>
        </div>
    </div>

    <script>
        // Core Logic
        const state = {
            chats: JSON.parse(localStorage.getItem('nixie_ch')) || [],
            curId: null,
            st: JSON.parse(localStorage.getItem('nixie_st')) || { 
                key: '', 
                mod: 'google/gemini-2.0-flash-001', 
                dark: true, 
                sys: 'You are NixieGPT, a helpful and professional AI assistant.' 
            },
            busy: false
        };

        const $ = (id) => document.getElementById(id);

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function toggleDark() {
            state.st.dark = !state.st.dark;
            document.documentElement.classList.toggle('dark', state.st.dark);
            $('themeBtn').innerHTML = state.st.dark ? "☀️ Light" : "🌙 Dark";
            saveSettings();
        }

        function saveSettings() { localStorage.setItem('nixie_st', JSON.stringify(state.st)); }
        function saveChats() { localStorage.setItem('nixie_ch', JSON.stringify(state.chats)); }

        function toggleSide() { $('side').classList.toggle('-translate-x-full'); }
        function openSet() { 
            $('key').value = state.st.key; 
            $('mod').value = state.st.mod; 
            $('sys').value = state.st.sys; 
            $('modal').classList.remove('hidden'); 
        }
        function closeSet() { $('modal').classList.add('hidden'); }
        function saveSet() { 
            state.st.key = $('key').value.trim(); 
            state.st.mod = $('mod').value.trim() || 'google/gemini-2.0-flash-001'; 
            state.st.sys = $('sys').value.trim(); 
            saveSettings(); 
            closeSet();
            updateUI();
        }

        function renderHistory() {
            if (state.chats.length === 0) {
                $('history').innerHTML = '<p class="text-center text-xs opacity-30 mt-10 italic">No history yet</p>';
                return;
            }
            $('history').innerHTML = state.chats.slice().reverse().map(c => `
                <div onclick="loadChat('${c.id}')" class="group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${state.curId === c.id ? 'bg-blue-500/10 text-blue-500 border border-blue-500/20' : 'hover:bg-gray-100 dark:hover:bg-gray-800'}">
                    <div class="flex items-center gap-3 truncate">
                        <span class="text-xs">💬</span>
                        <span class="truncate text-sm font-medium">${c.title}</span>
                    </div>
                    <button onclick="delChat('${c.id}', event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition">✕</button>
                </div>
            `).join('');
        }

        function loadChat(id) {
            state.curId = id;
            const chat = state.chats.find(c => c.id === id);
            $('welcome').style.display = chat.msgs.length ? 'none' : 'flex';
            
            $('chat').innerHTML = chat.msgs.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble">
                    <div class="relative group max-w-[90%] md:max-w-[75%] px-5 py-3 rounded-2xl ${
                        m.role === 'user' 
                        ? 'bg-blue-600 text-white rounded-br-none shadow-lg' 
                        : 'bg-white dark:bg-[#161b22] border border-gray-200 dark:border-gray-800 rounded-bl-none shadow-sm'
                    } prose ${m.role === 'user' ? 'prose-invert' : 'dark:prose-invert'} prose-sm sm:prose-base">
                        ${m.role === 'user' ? m.content : DOMPurify.sanitize(marked.parse(m.content))}
                    </div>
                </div>
            `).join('') + (chat.msgs.length > 0 ? '' : '<div id="welcome">...</div>'); // Re-attach welcome if empty
            
            if(!chat.msgs.length) $('welcome').style.display = 'flex';
            renderHistory();
            scrollToBottom();
        }

        function newChat() {
            const id = Date.now().toString();
            state.chats.push({ id, title: 'New Chat', msgs: [] });
            state.curId = id;
            saveChats();
            loadChat(id);
            if(window.innerWidth < 768) toggleSide();
            $('input').focus();
        }

        function delChat(id, e) {
            e.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.curId === id) state.curId = state.chats.length ? state.chats[state.chats.length-1].id : null;
            saveChats();
            state.curId ? loadChat(state.curId) : location.reload();
        }

        function scrollToBottom() {
            $('chat').scrollTop = $('chat').scrollHeight;
        }

        async function send() {
            const val = $('input').value.trim();
            if (!val || state.busy) return;
            
            if (!state.st.key) {
                alert("API Key missing! Check settings.");
                return openSet();
            }

            if (!state.curId) newChat();
            const chat = state.chats.find(c => c.id === state.curId);
            
            // UI Updates
            $('welcome').style.display = 'none';
            chat.msgs.push({ role: 'user', content: val });
            if (chat.title === 'New Chat') chat.title = val.substring(0, 30);
            
            $('input').value = '';
            $('input').style.height = 'auto';
            loadChat(state.curId);
            
            state.busy = true;
            $('sendBtn').disabled = true;

            const aiMsg = { role: 'assistant', content: '' };
            chat.msgs.push(aiMsg);
            
            const msgContainer = document.createElement('div');
            msgContainer.className = "flex justify-start w-full chat-bubble";
            const msgDiv = document.createElement('div');
            msgDiv.className = "max-w-[90%] md:max-w-[75%] px-5 py-3 rounded-2xl bg-white dark:bg-[#161b22] border border-gray-200 dark:border-gray-800 rounded-bl-none shadow-sm prose dark:prose-invert prose-sm sm:prose-base typing";
            msgContainer.appendChild(msgDiv);
            $('chat').appendChild(msgContainer);
            scrollToBottom();

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${state.st.key}`, 
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin,
                        "X-Title": "NixieGPT"
                    },
                    body: JSON.stringify({
                        model: state.st.mod || "google/gemini-2.0-flash-001",
                        messages: state.st.sys ? [{role:'system',content:state.st.sys}, ...chat.msgs.slice(0,-1)] : chat.msgs.slice(0,-1),
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const text = json.choices[0]?.delta?.content || '';
                                aiMsg.content += text;
                                msgDiv.innerHTML = DOMPurify.sanitize(marked.parse(aiMsg.content));
                                scrollToBottom();
                            } catch(e) {}
                        }
                    }
                }
            } catch (err) { 
                aiMsg.content = "⚠️ **System Error:** " + err.message + ". Please verify your API Key and Model ID in Settings.";
                msgDiv.innerHTML = DOMPurify.sanitize(marked.parse(aiMsg.content));
                msgDiv.classList.add('border-red-500', 'text-red-500');
            } finally {
                msgDiv.classList.remove('typing');
                state.busy = false;
                $('sendBtn').disabled = false;
                saveChats();
                renderHistory();
            }
        }

        function updateUI() {
            $('modelBadge').innerText = state.st.mod.split('/').pop();
            $('themeBtn').innerHTML = state.st.dark ? "☀️ Light" : "🌙 Dark";
        }

        // Handle Enter key (Shift+Enter for newline)
        $('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        window.onload = () => {
            updateUI();
            if (state.chats.length) loadChat(state.chats[state.chats.length-1].id);
            renderHistory();
            setTimeout(() => {
                $('loading').style.opacity = '0';
                setTimeout(() => $('loading').style.display = 'none', 500);
            }, 800);
        };
    </script>
</body>
  </html>
