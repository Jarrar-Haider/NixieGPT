<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NixieGPT</title>

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            light: '#f0f4f9',
                            dark: '#131314',
                            border: '#e3e3e3',
                            darkborder: '#444746',
                            msgdark: '#1e1f20'
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        /* Custom Scrollbar for a cleaner UI */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 10px; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Cursor animation for streaming */
        .cursor-blink::after {
            content: '▋';
            display: inline-block;
            animation: blink 1s step-start infinite;
            margin-left: 2px;
            color: #3b82f6;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Ensure smooth full-screen experience on mobile */
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>

<body class="bg-white dark:bg-gemini-dark text-gray-900 dark:text-gray-100 flex flex-col min-h-[100dvh] m-0 p-0 transition-colors duration-200">

    <div id="app-loader" class="fixed inset-0 bg-white dark:bg-gemini-dark flex flex-col items-center justify-center z-[9999] transition-opacity duration-300">
        <svg class="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h1 class="text-xl font-semibold tracking-wide text-gray-800 dark:text-gray-200">Loading NixieGPT...</h1>
    </div>

    <header class="sticky top-0 z-30 flex items-center justify-between p-3 bg-white/80 dark:bg-gemini-dark/80 backdrop-blur-md border-b border-gray-200 dark:border-gemini-darkborder">
        <div class="flex items-center gap-3">
            <button id="btn-toggle-sidebar" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-xl font-medium tracking-tight">NixieGPT</h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-theme" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors focus:outline-none" title="Toggle Dark Mode">
                <svg id="icon-moon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="icon-sun" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 2.32a1 1 0 011.415 0l.707.707a1 1 0 01-1.414 1.414l-.708-.707a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-2.32 4.22a1 1 0 010 1.415l-.707.707a1 1 0 11-1.414-1.414l.707-.708a1 1 0 011.414 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-2.32a1 1 0 01-1.415 0l-.707-.707a1 1 0 011.414-1.414l.707.707a1 1 0 010 1.414zM4 10a1 1 0 01-1 1H2a1 1 0 110-2h1a1 1 0 011 1zM6.32 6.32a1 1 0 010-1.415l.707-.707a1 1 0 011.414 1.414L7.734 6.32a1 1 0 01-1.414 0zM10 5a5 5 0 100 10 5 5 0 000-10z" clip-rule="evenodd"></path></svg>
            </button>
            <button id="btn-settings" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors focus:outline-none" title="Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </header>

    <div class="flex flex-1 relative w-full h-full overflow-hidden">
        
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity lg:hidden"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-[280px] bg-gemini-light dark:bg-gemini-msgdark border-r border-gray-200 dark:border-gemini-darkborder transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:block flex flex-col h-[100dvh] lg:h-auto pb-16 lg:pb-0 pt-16 lg:pt-0">
            <button id="btn-close-sidebar" class="absolute top-4 right-4 p-2 lg:hidden text-gray-500 hover:text-gray-800 dark:hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="p-4 mt-2 lg:mt-0">
                <button id="btn-new-chat" class="w-full flex items-center justify-start gap-3 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-100 border border-gray-200 dark:border-gray-700 rounded-2xl py-3 px-4 shadow-sm transition-all focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span class="font-medium">New Chat</span>
                </button>
            </div>

            <div class="px-4 pb-2 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Recent</div>
            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1 hide-scrollbar">
                </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0">
            
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 sm:p-6 w-full">
                <div class="max-w-3xl mx-auto w-full space-y-6 pb-24" id="chat-feed">
                    <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center mt-20 sm:mt-32 opacity-0 transition-opacity duration-500">
                        <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-500 rounded-full flex items-center justify-center mb-6">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <h2 class="text-2xl font-semibold mb-2 text-gray-800 dark:text-gray-200">How can I help you today?</h2>
                        <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto">Enter a prompt below to start chatting with NixieGPT.</p>
                    </div>
                </div>
            </div>

            <div class="sticky bottom-0 w-full bg-white dark:bg-gemini-dark pb-4 pt-2 px-4 sm:px-6 z-20">
                <div class="max-w-3xl mx-auto w-full relative">
                    <form id="input-form" class="relative flex items-end w-full bg-gemini-light dark:bg-gemini-msgdark rounded-3xl border border-gray-200 dark:border-gemini-darkborder shadow-sm focus-within:ring-1 focus-within:ring-gray-300 dark:focus-within:ring-gray-600 transition-shadow">
                        <textarea id="user-input" rows="1" placeholder="Ask NixieGPT anything..." class="w-full max-h-32 bg-transparent text-gray-900 dark:text-gray-100 border-0 focus:ring-0 resize-none py-4 pl-6 pr-14 hide-scrollbar placeholder-gray-500 dark:placeholder-gray-400 rounded-3xl" required></textarea>
                        <button type="submit" id="btn-submit" class="absolute right-2 bottom-2 p-2 rounded-full text-gray-400 hover:text-blue-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                        </button>
                    </form>
                    <div class="text-center text-xs text-gray-400 mt-2">NixieGPT can make mistakes. Check important info.</div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-gemini-darkborder text-gray-900 dark:text-gray-100 w-full max-w-md rounded-2xl shadow-2xl flex flex-col transform scale-95 transition-transform duration-200" id="settings-box">
            <div class="flex items-center justify-between p-5 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-lg font-semibold">Settings</h3>
                <button id="btn-close-settings" class="text-gray-500 hover:text-gray-800 dark:hover:text-white focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="input-apikey" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="input-model" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="deepseek/deepseek-r1:free">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="input-system" rows="3" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="You are a helpful AI assistant..."></textarea>
                </div>
            </div>
            <div class="p-5 border-t border-gray-200 dark:border-gray-700 flex justify-end">
                <button id="btn-save-settings" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. DEFENSIVE SETUP & CONFIGURATION ---
            
            // Configure Marked.js with Highlight.js and DOMPurify
            marked.setOptions({
                breaks: true,
                highlight: function (code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
                    }
                    return hljs.highlightAuto(code).value;
                }
            });

            // State Management
            const State = {
                chats: [],
                currentChatId: null,
                isGenerating: false,
                settings: {
                    apiKey: '',
                    model: 'deepseek/deepseek-r1:free',
                    systemPrompt: 'You are NixieGPT, a helpful and intelligent AI assistant.',
                    darkMode: false
                }
            };

            // DOM Elements
            const DOM = {
                loader: document.getElementById('app-loader'),
                btnToggleSidebar: document.getElementById('btn-toggle-sidebar'),
                btnCloseSidebar: document.getElementById('btn-close-sidebar'),
                sidebar: document.getElementById('sidebar'),
                sidebarBackdrop: document.getElementById('sidebar-backdrop'),
                btnTheme: document.getElementById('btn-theme'),
                iconSun: document.getElementById('icon-sun'),
                iconMoon: document.getElementById('icon-moon'),
                btnSettings: document.getElementById('btn-settings'),
                settingsModal: document.getElementById('settings-modal'),
                settingsBox: document.getElementById('settings-box'),
                btnCloseSettings: document.getElementById('btn-close-settings'),
                btnSaveSettings: document.getElementById('btn-save-settings'),
                inputApiKey: document.getElementById('input-apikey'),
                inputModel: document.getElementById('input-model'),
                inputSystem: document.getElementById('input-system'),
                btnNewChat: document.getElementById('btn-new-chat'),
                chatList: document.getElementById('chat-list'),
                chatFeed: document.getElementById('chat-feed'),
                messagesContainer: document.getElementById('messages-container'),
                emptyState: document.getElementById('empty-state'),
                inputForm: document.getElementById('input-form'),
                userInput: document.getElementById('user-input'),
                btnSubmit: document.getElementById('btn-submit')
            };

            // --- 2. LOCAL STORAGE & INITIALIZATION ---

            function loadState() {
                try {
                    const savedSettings = localStorage.getItem('nixiegpt_settings');
                    if (savedSettings) State.settings = { ...State.settings, ...JSON.parse(savedSettings) };
                    
                    const savedChats = localStorage.getItem('nixiegpt_chats');
                    if (savedChats) State.chats = JSON.parse(savedChats);
                    
                    const savedActiveId = localStorage.getItem('nixiegpt_activeChat');
                    if (savedActiveId && State.chats.some(c => c.id === savedActiveId)) {
                        State.currentChatId = savedActiveId;
                    } else if (State.chats.length > 0) {
                        State.currentChatId = State.chats[0].id;
                    }
                } catch (e) {
                    console.error("Storage error:", e);
                }
            }

            function saveState() {
                try {
                    localStorage.setItem('nixiegpt_settings', JSON.stringify(State.settings));
                    localStorage.setItem('nixiegpt_chats', JSON.stringify(State.chats));
                    if (State.currentChatId) {
                        localStorage.setItem('nixiegpt_activeChat', State.currentChatId);
                    } else {
                        localStorage.removeItem('nixiegpt_activeChat');
                    }
                } catch (e) {
                    console.error("Save error:", e);
                }
            }

            function applyTheme() {
                if (State.settings.darkMode) {
                    document.documentElement.classList.add('dark');
                    DOM.iconSun.classList.add('hidden');
                    DOM.iconMoon.classList.remove('hidden');
                } else {
                    document.documentElement.classList.remove('dark');
                    DOM.iconSun.classList.remove('hidden');
                    DOM.iconMoon.classList.add('hidden');
                }
            }

            // Generate UUID-like short ID
            function genId() { return Math.random().toString(36).substring(2, 10); }

            // --- 3. UI RENDERERS ---

            function renderSidebar() {
                DOM.chatList.innerHTML = '';
                State.chats.forEach(chat => {
                    const isActive = chat.id === State.currentChatId;
                    const btn = document.createElement('div');
                    btn.className = `group flex items-center justify-between p-3 mb-1 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-100 dark:hover:bg-gray-800/50 text-gray-700 dark:text-gray-300'}`;
                    
                    btn.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden flex-1" onclick="window.switchChat('${chat.id}')">
                            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                            <span class="truncate text-sm font-medium">${DOMPurify.sanitize(chat.title)}</span>
                        </div>
                        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="window.renameChat(event, '${chat.id}')" class="p-1 text-gray-400 hover:text-blue-500 transition-colors" title="Rename"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                            <button onclick="window.deleteChat(event, '${chat.id}')" class="p-1 text-gray-400 hover:text-red-500 t
