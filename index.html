<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NixieGPT</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: linear-gradient(135deg, #b91c1c, #1e3a8a);
  color: white;
  display: flex;
  justify-content: center;
}

/* APP */
.app {
  width: 100%;
  max-width: 520px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 14px;
  text-align: center;
  font-weight: bold;
  background: rgba(0,0,0,0.3);
  font-size: 18px;
}

/* SETTINGS */
.settings {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px;
}

input {
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
}

/* BUTTONS */
button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #f59e0b;
  font-weight: bold;
  cursor: pointer;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* MESSAGE */
.msg {
  padding: 10px;
  border-radius: 10px;
  max-width: 75%;
  font-size: 14px;
}

.user {
  background: #22c55e;
  align-self: flex-end;
}

.ai {
  background: rgba(0,0,0,0.4);
  align-self: flex-start;
}

/* INPUT AREA */
.input-area {
  display: flex;
  padding: 10px;
  background: rgba(0,0,0,0.4);
}

.input-area input {
  flex: 1;
  margin-right: 6px;
}
</style>

</head>

<body>

<div class="app">

<header>NixieGPT 🇳🇵</header>

<div class="settings">
  <input id="apiKey" placeholder="Enter API Key">
  <button onclick="saveKey()">Save API Key</button>

  <input id="model" placeholder="Model (e.g. qwen/qwen3.6-plus:free)">
</div>

<div id="chat"></div>

<div class="input-area">
  <input id="message" placeholder="Ask something..." />
  <button onclick="send()">Send</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

/* SAVE KEY */
function saveKey() {
  const key = document.getElementById("apiKey").value.trim();
  if (!key) return alert("Enter API Key");

  localStorage.setItem("nixie_key", key);
  alert("Saved!");
}

/* LOAD KEY */
window.onload = () => {
  const key = localStorage.getItem("nixie_key");
  if (key) document.getElementById("apiKey").value = key;
};

/* ADD MESSAGE */
function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* SEND MESSAGE */
async function send() {
  const key = document.getElementById("apiKey").value.trim();
  const model = document.getElementById("model").value.trim();
  const input = document.getElementById("message");

  if (!key || !model) {
    alert("Enter API key + model");
    return;
  }

  if (!input.value.trim()) return;

  add(input.value, "user");

  const msg = input.value;
  input.value = "";

  // loading
  const loading = document.createElement("div");
  loading.className = "msg ai";
  loading.innerText = "Thinking...";
  chat.appendChild(loading);

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + key,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: "system", content: "You are a helpful AI assistant." },
          { role: "user", content: msg }
        ]
      })
    });

    const data = await res.json();

    chat.removeChild(loading);

    if (!res.ok) {
      add("Error: " + (data.error?.message || "Failed"), "ai");
      return;
    }

    const reply = data.choices?.[0]?.message?.content || "No reply";
    add(reply, "ai");

  } catch (e) {
    chat.removeChild(loading);
    add("Error: " + e.message, "ai");
  }
}
</script>

</body>
</html>
