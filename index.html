<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NixieGPT</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
}
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="w-full max-w-xl h-[90vh] flex flex-col rounded-3xl glass shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="p-4 flex justify-between items-center bg-gradient-to-r from-blue-600 to-purple-600">
        <h1 class="font-black text-xl">NIXIEGPT</h1>
        <div id="lock">🔒</div>
    </div>

    <!-- API KEY -->
    <div class="p-3 border-b border-white/10 flex gap-2">
        <input id="api-key" placeholder="Paste OpenRouter Key..."
            class="flex-1 p-3 rounded-xl bg-white/10 outline-none">
        <button onclick="saveKey()"
            class="bg-yellow-400 text-black px-4 rounded-xl font-bold">
            SAVE
        </button>
    </div>

    <!-- Chat -->
    <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

    <!-- Input -->
    <form id="form" class="p-3 flex gap-2 border-t border-white/10">
        <input id="input" class="flex-1 p-3 rounded-xl bg-white/10 outline-none"
            placeholder="Ask something...">
        <button id="send" class="bg-blue-500 px-6 rounded-xl font-bold">
            ➤
        </button>
    </form>

</div>

<script>

let KEY = localStorage.getItem("nx_key") || "";
if(KEY){
    document.getElementById("api-key").value = KEY;
    document.getElementById("lock").innerText = "🔓";
}

function cleanKey(k){
    return k.replace(/[\s\u200B-\u200D\uFEFF]/g, "");
}

function saveKey(){
    KEY = cleanKey(document.getElementById("api-key").value);
    localStorage.setItem("nx_key", KEY);
    document.getElementById("lock").innerText = "🔓";
    alert("Key saved!");
}

async function askAI(text){
    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "google/gemini-2.0-flash-lite-preview-02-05:free",
                messages: [{ role: "user", content: text }]
            })
        });

        const data = await res.json();

        console.log("API:", data);

        if (!res.ok) {
            return `❌ ${data.error?.message || "Request failed"}`;
        }

        if (!data.choices?.length) {
            return "❌ No response from AI";
        }

        return data.choices[0].message.content;

    } catch (err) {
        console.log(err);
        return "❌ Network Error";
    }
}

document.getElementById("form").onsubmit = async (e)=>{
    e.preventDefault();

    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text || !KEY) return alert("Save API key first!");

    const chat = document.getElementById("chat");

    // User message
    const user = document.createElement("div");
    user.className = "bg-blue-600 p-3 rounded-2xl ml-auto max-w-[80%]";
    user.innerText = text;
    chat.appendChild(user);

    input.value = "";

    // AI message
    const ai = document.createElement("div");
    ai.className = "bg-white/10 p-3 rounded-2xl max-w-[80%]";
    ai.innerText = "Thinking...";
    chat.appendChild(ai);

    chat.scrollTop = chat.scrollHeight;

    const reply = await askAI(text);

    if(reply.startsWith("❌")){
        ai.innerHTML = `<span class="text-red-400">${reply}</span>`;
    } else {
        ai.innerHTML = marked.parse(reply);
    }

    chat.scrollTop = chat.scrollHeight;
};

</script>

</body>
</html>
