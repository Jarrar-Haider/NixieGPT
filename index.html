<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NixieGPT | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        #loading { position: fixed; inset: 0; background: #0a0a0a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
        .spinner { width: 45px; height: 45px; border: 3px solid #333; border-left-color: #DC143C; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .nepal-title { color: #DC143C; -webkit-text-stroke: 0.5px #003893; text-shadow: 1.5px 1.5px 0px #003893; font-weight: 800; }
        .typing::after { content: '●'; animation: pulse 1s infinite; color: #3b82f6; margin-left: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .chat-bubble { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' };
        document.documentElement.classList.add('dark');
    </script>
</head>
<body class="bg-[#0d1117] text-gray-200 min-h-screen flex flex-col md:flex-row overflow-hidden dark">
    
    <div id="loading"><div class="spinner mb-4"></div><h2 class="nepal-title text-2xl tracking-tighter">NixieGPT</h2></div>

    <aside id="side" class="fixed md:sticky top-0 left-0 h-screen w-72 bg-[#010409] border-r border-gray-800 z-50 transition-transform -translate-x-full md:translate-x-0 flex flex-col shadow-2xl">
        <div class="p-6 flex justify-between items-center border-b border-gray-800">
            <h1 class="text-2xl nepal-title">NixieGPT</h1>
            <button onclick="toggleSide()" class="md:hidden text-gray-500">✕</button>
        </div>
        <button onclick="newChat()" class="mx-4 mt-6 p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-blue-500/20 active:scale-95">+ New Conversation</button>
        <div id="history" class="flex-1 overflow-y-auto mt-4 px-3 space-y-1 pb-4"></div>
        <div class="p-4 border-t border-gray-800 text-center">
            <span class="text-[10px] uppercase tracking-widest opacity-40">Local Logic Mode</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="p-4 border-b border-gray-800 md:hidden flex justify-between items-center bg-[#0d1117]">
            <button onclick="toggleSide()" class="text-2xl">☰</button>
            <h1 class="nepal-title text-xl">NixieGPT</h1>
            <div class="w-8"></div>
        </header>

        <div id="chat" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 scroll-smooth">
            <div id="welcome" class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-60">
                <div class="w-20 h-20 border-4 border-blue-500 rounded-full flex items-center justify-center text-3xl font-black text-blue-500">N</div>
                <h2 class="text-2xl font-bold tracking-tight">How can I help you?</h2>
                <p class="max-w-md text-sm">Ask me anything. I'm listening.</p>
            </div>
        </div>

        <div class="w-full p-4 md:p-6 bg-gradient-to-t from-[#0d1117] via-[#0d1117] to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <div class="relative flex flex-col gap-2 bg-[#161b22] p-2 rounded-2xl border border-gray-700 shadow-xl focus-within:border-blue-500/50 transition-colors">
                    <textarea id="input" rows="1" class="w-full p-3 bg-transparent outline-none resize-none max-h-48 text-lg" placeholder="Message NixieGPT..."></textarea>
                    <div class="flex justify-end items-center px-2 pb-1">
                        <button id="sendBtn" onclick="handleSend()" class="bg-blue-600 hover:bg-blue-700 text-white p-2 px-6 rounded-xl transition-all font-bold active:scale-95">
                            Send
                        </button>
                    </div>
                </div>
            </div>
            <p class="text-[10px] text-center mt-3 opacity-30 uppercase tracking-widest font-bold">Nixie Engine v1.0 • No API Required</p>
        </div>
    </main>

    <script>
        const $ = (id) => document.getElementById(id);
        
        function toggleSide() { $('side').classList.toggle('-translate-x-full'); }

        function appendMessage(role, text) {
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full chat-bubble`;
            wrap.innerHTML = `
                <div class="${role === 'user' ? 'bg-blue-600 text-white rounded-br-none shadow-lg' : 'bg-[#161b22] border border-gray-800 rounded-bl-none shadow-sm'} p-4 px-5 rounded-2xl max-w-[85%]">
                    <p class="text-[15px] leading-relaxed">${text}</p>
                </div>
            `;
            $('chat').appendChild(wrap);
            $('chat').scrollTop = $('chat').scrollHeight;
        }

        function handleSend() {
            const val = $('input').value.trim();
            if (!val) return;

            // Remove welcome screen on first message
            if ($('welcome')) $('welcome').style.display = 'none';
            
            appendMessage('user', val);
            $('input').value = '';

            // Moody Logic Brain
            setTimeout(() => {
                // Generates "Idk" most of the time, and "Idc" sometimes (randomly)
                const isMoody = Math.random() > 0.7; // 30% chance for Idc
                const reply = isMoody ? "Idc" : "Idk";

                appendMessage('bot', reply);
            }, 700);
        }

        function newChat() {
            $('chat').innerHTML = '';
            // Re-add welcome view
            $('chat').innerHTML = `
                <div id="welcome" class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-60">
                    <div class="w-20 h-20 border-4 border-blue-500 rounded-full flex items-center justify-center text-3xl font-black text-blue-500">N</div>
                    <h2 class="text-2xl font-bold tracking-tight">New Conversation</h2>
                    <p class="max-w-md text-sm">Waiting for your message...</p>
                </div>
            `;
            if(window.innerWidth < 768) toggleSide();
            $('input').focus();
        }

        // Send on Enter
        $('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        window.onload = () => {
            setTimeout(() => {
                $('loading').style.opacity = '0';
                setTimeout(() => $('loading').style.display = 'none', 500);
            }, 800);
        };
    </script>
</body>
  </html>
