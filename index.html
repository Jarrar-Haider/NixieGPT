<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NixieGPT | OS v4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #DC143C;
            --bg-dark: #050505;
        }

        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-dark); color: #e0e0e0; overflow: hidden; }

        /* Advanced Startup Animation */
        #loading { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scanner { width: 300px; height: 1px; background: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); position: relative; animation: scan 1.5s ease-in-out infinite; }
        @keyframes scan { 0%, 100% { transform: translateY(-40px); opacity: 0; } 50% { transform: translateY(40px); opacity: 1; } }

        .nepal-title { color: var(--neon-red); text-shadow: 0 0 15px rgba(220, 20, 60, 0.6); font-weight: 800; letter-spacing: -1px; }

        .glass-panel { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }

        .bot-bubble { background: rgba(220, 20, 60, 0.05); border: 1px solid rgba(220, 20, 60, 0.2); box-shadow: inset 0 0 15px rgba(220, 20, 60, 0.05); }
        .user-bubble { background: linear-gradient(135deg, #111, #222); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }

        .input-glow { border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-glow:focus-within { border-color: var(--neon-red); box-shadow: 0 0 30px rgba(220, 20, 60, 0.2); }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">
    
    <div id="loading">
        <div class="scanner mb-6"></div>
        <h2 class="nepal-title text-4xl mb-2 italic">NIXIE_OS_4.2</h2>
        <p class="mono text-[10px] text-red-500 animate-pulse uppercase tracking-[0.5em]">Establishing Neural Link to Nepal...</p>
    </div>

    <aside id="side" class="fixed md:sticky top-0 left-0 h-screen w-80 glass-panel z-50 transition-transform -translate-x-full md:translate-x-0 flex flex-col shadow-[20px_0_50px_rgba(0,0,0,0.5)]">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-3xl nepal-title">NixieGPT</h1>
            <p class="mono text-[9px] opacity-40 mt-2 uppercase tracking-widest">Local Matrix // Kathmandu Node</p>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto space-y-2">
            <button onclick="newChat()" class="w-full p-4 bg-red-900/10 hover:bg-red-900/20 border border-red-500/20 rounded-xl transition-all mono text-[10px] text-left flex justify-between items-center group">
                <span class="text-red-400">RESET_SESSION_001</span>
                <span class="opacity-0 group-hover:opacity-100 text-red-500">>></span>
            </button>
            <div id="history" class="mt-8 space-y-2">
                <div class="px-2 text-[9px] opacity-20 font-bold uppercase tracking-[0.3em] mb-4">Neural_Logs</div>
            </div>
        </div>

        <div class="p-6 border-t border-white/5 flex items-center gap-3">
            <div class="w-1.5 h-1.5 rounded-full bg-red-600 animate-pulse shadow-[0_0_10px_#f00]"></div>
            <span class="mono text-[9px] opacity-50 uppercase tracking-widest">Nepal Node Active</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative bg-[#050505]">
        <header class="p-5 flex md:hidden justify-between items-center border-b border-white/5">
            <button onclick="toggleSide()" class="text-red-500 mono text-xs tracking-widest">MENU_OS</button>
            <h1 class="nepal-title text-xl">NIXIE</h1>
            <div class="w-4"></div>
        </header>

        <div id="chat" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 scroll-smooth pb-32">
            </div>

        <div class="absolute bottom-0 left-0 w-full p-6 md:p-10 bg-gradient-to-t from-black to-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="input-glow flex flex-col bg-[#0a0a0a]/90 rounded-2xl p-2 backdrop-blur-xl">
                    <textarea id="input" rows="1" class="w-full p-4 bg-transparent outline-none resize-none text-lg placeholder:opacity-10 mono" placeholder="AWAITING COMMAND..."></textarea>
                    <div class="flex justify-between items-center p-2 pt-0">
                        <div class="px-2 mono text-[9px] opacity-20 uppercase tracking-widest">Local_Overload_v4</div>
                        <button onclick="handleSend()" class="bg-red-600 hover:bg-red-500 text-white px-10 py-2 rounded-lg font-bold transition-all active:scale-95 mono text-xs shadow-[0_0_20px_rgba(220,20,60,0.3)]">
                            EXECUTE
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const $ = (id) => document.getElementById(id);
        let messageCount = 0;
        
        function toggleSide() { $('side').classList.toggle('-translate-x-full'); }

        function appendMessage(role, text) {
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full fade-up`;
            wrap.innerHTML = `
                <div class="${role === 'user' ? 'user-bubble rounded-br-none' : 'bot-bubble rounded-bl-none'} p-5 px-7 rounded-2xl max-w-[85%] md:max-w-[65%]">
                    <p class="${role === 'bot' ? 'mono text-red-100' : 'text-gray-200'} text-sm md:text-base leading-relaxed tracking-tight">${text}</p>
                </div>
            `;
            $('chat').appendChild(wrap);
            $('chat').scrollTop = $('chat').scrollHeight;
        }

        function handleSend() {
            const val = $('input').value.trim();
            if (!val) return;

            appendMessage('user', val);
            $('input').value = '';
            messageCount++;

            // Intelligent Moody Logic Engine
            setTimeout(() => {
                let reply = "";
                
                if (messageCount === 1) {
                    // Force first response after initial greeting
                    reply = "Do you bleed?";
                } else {
                    // Logic chain: Mostly "Idk", Rarely "Idc" (90/10 split)
                    const chance = Math.random();
                    reply = (chance > 0.9) ? "Idc" : "Idk";
                }

                appendMessage('bot', reply);
            }, 800);
        }

        function initApp() {
            $('chat').innerHTML = '';
            messageCount = 0;
            // The Automatic Hardcoded Greeting
            setTimeout(() => {
                appendMessage('bot', "Hey I'm Nixie from Nepal , bhok tmkc");
            }, 500);
        }

        function newChat() {
            initApp();
            if(window.innerWidth < 768) toggleSide();
            $('input').focus();
        }

        $('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        window.onload = () => {
            setTimeout(() => {
                $('loading').style.opacity = '0';
                setTimeout(() => {
                    $('loading').style.display = 'none';
                    initApp();
                }, 500);
            }, 2500);
        };
    </script>
</body>
  </html>
