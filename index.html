<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NixieGPT</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #dc2626, #1e3a8a);
  color: white;
}

.container {
  max-width: 480px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
header {
  padding: 12px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: rgba(0,0,0,0.3);
}

/* Settings */
.settings {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
}

button {
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #f59e0b;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* Chat */
#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Messages */
.msg {
  padding: 8px;
  border-radius: 8px;
  max-width: 75%;
  font-size: 13px;
}

.user {
  background: #22c55e;
  align-self: flex-end;
}

.ai {
  background: rgba(0,0,0,0.4);
  align-self: flex-start;
}

/* Input */
.input-area {
  display: flex;
  padding: 8px;
  background: rgba(0,0,0,0.3);
}

.input-area input {
  flex: 1;
}
</style>

</head>
<body>

<div class="container">

<header>NixieGPT 🇳🇵</header>

<div class="settings">
  <input id="apiKey" placeholder="Enter API Key">
  <button onclick="saveKey()">Save Key</button>

  <input id="model" placeholder="Model (e.g. qwen/qwen3.6-plus:free)">
</div>

<div id="chat"></div>

<div class="input-area">
  <input id="message" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

// Add message
function add(text, cls) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerText = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

// Save API Key
function saveKey() {
  const key = document.getElementById("apiKey").value.trim();
  if (!key) return alert("Enter API Key");
  localStorage.setItem("openrouter_key", key);
  alert("API Key Saved!");
}

// Load API Key on start
window.onload = function () {
  const savedKey = localStorage.getItem("openrouter_key");
  if (savedKey) {
    document.getElementById("apiKey").value = savedKey;
  }
};

// Send message
async function send() {
  const key = document.getElementById("apiKey").value.trim();
  const model = document.getElementById("model").value.trim();
  const msg = document.getElementById("message").value.trim();

  if (!key || !model) {
    alert("Enter API Key and Model");
    return;
  }

  if (!msg) return;

  add(msg, "user");
  document.getElementById("message").value = "";

  // loading
  add("Thinking...", "ai");

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + key,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: model,
        messages: [
          {
            role: "system",
            content: "You are a helpful AI assistant."
          },
          {
            role: "user",
            content: msg
          }
        ]
      })
    });

    const data = await res.json();

    // remove loading
    chat.removeChild(chat.lastChild);

    if (!res.ok) {
      add("Error: " + (data.error?.message || "Request failed"), "ai");
      return;
    }

    const reply = data.choices?.[0]?.message?.content || "No response";
    add(reply, "ai");

  } catch (err) {
    chat.removeChild(chat.lastChild);
    add("Error: " + err.message, "ai");
  }
}
</script>

</body>
</html>
