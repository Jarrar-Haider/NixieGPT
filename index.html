<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NixieGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0d1117; color: #e0e0e0; overflow: hidden; }

        /* Professional Scanner Loading */
        #loading { position: fixed; inset: 0; background: #0a0a0a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
        .scanner { width: 200px; height: 2px; background: #DC143C; box-shadow: 0 0 10px #DC143C; animation: scan 1.5s ease-in-out infinite; }
        @keyframes scan { 0%, 100% { transform: translateY(-30px); opacity: 0; } 50% { transform: translateY(30px); opacity: 1; } }
        .nepal-title { color: #DC143C; -webkit-text-stroke: 0.5px #003893; text-shadow: 1.5px 1.5px 0px #003893; font-weight: 800; }

        /* Clean UI elements */
        .glass-sidebar { background: #010409; border-right: 1px solid #30363d; }
        .chat-container { scroll-behavior: smooth; }
        .bot-bubble { background: #161b22; border: 1px solid #30363d; border-radius: 20px 20px 20px 0px; }
        .user-bubble { background: #003893; color: white; border-radius: 20px 20px 0px 20px; }
        
        /* Message Animation */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <div id="loading">
        <div class="scanner mb-4"></div>
        <h2 class="nepal-title text-3xl tracking-tighter">NixieGPT</h2>
    </div>

    <aside id="side" class="fixed md:sticky top-0 left-0 h-screen w-72 glass-sidebar z-50 transition-transform -translate-x-full md:translate-x-0 flex flex-col">
        <div class="p-6 border-b border-gray-800 flex justify-between items-center">
            <h1 class="text-2xl nepal-title">NixieGPT</h1>
            <button onclick="toggleSide()" class="md:hidden text-gray-500 text-xl">✕</button>
        </div>
        <div class="p-4 flex-1 overflow-y-auto">
            <button onclick="newChat()" class="w-full p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all font-semibold shadow-lg active:scale-95 text-sm">
                + New Chat
            </button>
            <div id="history" class="mt-6 space-y-2 opacity-40 text-[10px] uppercase font-bold tracking-widest px-2">Session History</div>
        </div>
        <div class="p-6 border-t border-gray-800 flex flex-col gap-4">
            <label class="flex items-center gap-3 cursor-pointer group">
                <input type="checkbox" id="voiceToggle" class="hidden peer">
                <div class="w-10 h-5 bg-gray-700 rounded-full peer-checked:bg-red-600 transition-colors relative">
                    <div class="absolute top-1 left-1 w-3 h-3 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                </div>
                <span class="text-xs font-semibold opacity-70 group-hover:opacity-100 transition">Voice Reply</span>
            </label>
            <div class="text-[10px] opacity-30">V4.5 LOCAL ENGINE</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative bg-[#0d1117]">
        <header class="p-4 flex md:hidden justify-between items-center border-b border-gray-800 bg-[#0d1117]">
            <button onclick="toggleSide()" class="text-2xl">☰</button>
            <h1 class="nepal-title text-xl">NixieGPT</h1>
            <div class="w-8"></div>
        </header>

        <div id="chat" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-6 chat-container"></div>

        <div class="p-4 md:p-8 bg-gradient-to-t from-[#0d1117] via-[#0d1117] to-transparent">
            <div class="max-w-4xl mx-auto flex gap-3 bg-[#161b22] p-2 rounded-2xl border border-gray-700 shadow-2xl focus-within:border-gray-500 transition-all">
                <textarea id="input" rows="1" class="w-full p-3 bg-transparent outline-none resize-none text-base" placeholder="Type a message..."></textarea>
                <button onclick="handleSend()" class="bg-red-600 hover:bg-red-700 text-white px-6 rounded-xl font-bold transition-all active:scale-95 text-sm">
                    Sent
                </button>
            </div>
        </div>
    </main>

    <script>
        const $ = (id) => document.getElementById(id);
        let msgCount = 0;

        function toggleSide() { $('side').classList.toggle('-translate-x-full'); }

        function speakText(text) {
            if ($('voiceToggle').checked) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 1.0;
                msg.pitch = 1.0;
                window.speechSynthesis.speak(msg);
            }
        }

        function appendMsg(role, text) {
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full fade-in`;
            wrap.innerHTML = `
                <div class="${role === 'user' ? 'user-bubble' : 'bot-bubble'} p-4 px-5 max-w-[85%] md:max-w-[70%] shadow-lg">
                    <p class="text-sm md:text-base leading-relaxed">${text}</p>
                </div>
            `;
            $('chat').appendChild(wrap);
            $('chat').scrollTop = $('chat').scrollHeight;
            if (role === 'bot') speakText(text);
        }

        function handleSend() {
            const val = $('input').value.trim();
            const lower = val.toLowerCase();
            if (!val) return;

            appendMsg('user', val);
            $('input').value = '';
            msgCount++;

            setTimeout(() => {
                let reply = "";
                
                // Jarrar Easter Egg
                if (lower.includes("jarrar")) {
                    reply = "Jarrar mentioned 🦅🦅🔥";
                } 
                // Specific Response Order
                else if (msgCount === 1) {
                    reply = "Do you bleed?";
                } 
                // Regular Logic
                else {
                    reply = Math.random() > 0.9 ? "Idc" : "Idk";
                }

                appendMsg('bot', reply);
            }, 700);
        }

        function initApp() {
            $('chat').innerHTML = '';
            msgCount = 0;
            setTimeout(() => {
                appendMsg('bot', "Hey I'm Nixie from Nepal , bhok tmkc");
            }, 500);
        }

        function newChat() {
            initApp();
            if(window.innerWidth < 768) toggleSide();
            $('input').focus();
        }

        $('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        window.onload = () => {
            setTimeout(() => {
                $('loading').style.opacity = '0';
                setTimeout(() => {
                    $('loading').style.display = 'none';
                    initApp();
                }, 500);
            }, 1800);
        };
    </script>
</body>
</html>
