<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NixieGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=JetBrains+Mono&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #05070a; 
            color: #f8fafc; 
            overflow: hidden; 
        }

        /* Sleek Shimmer Title */
        .nixie-title {
            background: linear-gradient(135deg, #ff1e56 0%, #0044ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.05em;
            filter: drop-shadow(0 2px 10px rgba(255, 30, 86, 0.2));
        }

        /* Refined Loading */
        #loading { 
            position: fixed; inset: 0; background: #05070a; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .load-pill {
            width: 140px; height: 3px; background: rgba(255,255,255,0.05);
            border-radius: 10px; overflow: hidden; position: relative;
        }
        .load-pill::after {
            content: ''; position: absolute; left: 0; top: 0; height: 100%;
            width: 40%; background: #ff1e56; border-radius: 10px;
            animation: move 1.5s ease-in-out infinite;
        }
        @keyframes move { 0% { left: -40%; } 100% { left: 140%; } }

        /* Sidebar & Bubbles */
        .glass-sidebar { background: #0a0c10; border-right: 1px solid rgba(255,255,255,0.05); }
        .bot-bubble { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 18px 18px 18px 2px; 
        }
        .user-bubble { 
            background: linear-gradient(135deg, #0044ff, #002288); 
            border-radius: 18px 18px 2px 18px; 
            box-shadow: 0 4px 15px rgba(0, 68, 255, 0.2);
        }
        
        /* Voice Toggle Styling */
        .switch {
            width: 36px; height: 18px; background: #1a1d23;
            border-radius: 20px; position: relative; transition: .3s;
        }
        .switch::before {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: white; border-radius: 50%; top: 3px; left: 3px; transition: .3s;
        }
        input:checked + .switch { background: #ff1e56; }
        input:checked + .switch::before { left: 21px; }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <div id="loading">
        <h2 class="nixie-title text-4xl mb-6">Nixie</h2>
        <div class="load-pill"></div>
    </div>

    <aside id="side" class="fixed md:sticky top-0 left-0 h-screen w-72 glass-sidebar z-50 transition-transform -translate-x-full md:translate-x-0 flex flex-col">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h1 class="text-3xl nixie-title">NixieGPT</h1>
            <button onclick="toggleSide()" class="md:hidden text-white/50">✕</button>
        </div>
        <div class="p-5 flex-1 overflow-y-auto">
            <button onclick="newChat()" class="w-full py-3 bg-white/5 hover:bg-white/10 text-white rounded-xl transition-all border border-white/5 text-sm font-medium">
                New Session
            </button>
            <div class="mt-8 px-2 text-[10px] uppercase tracking-widest text-white/30 font-bold">Encrypted Logs</div>
        </div>
        <div class="p-8 border-t border-white/5 space-y-4">
            <label class="flex items-center justify-between cursor-pointer">
                <span class="text-xs text-white/60">Audio Synthesis</span>
                <div class="relative">
                    <input type="checkbox" id="voiceToggle" class="hidden">
                    <div class="switch" onclick="this.previousElementSibling.click()"></div>
                </div>
            </label>
            <div class="text-[9px] opacity-20 mono">OS_VERSION_5.0_LOCAL</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative bg-[#05070a]">
        <header class="p-5 md:hidden border-b border-white/5 bg-[#05070a]">
            <div class="flex justify-between items-center">
                <button onclick="toggleSide()" class="text-xl">☰</button>
                <h1 class="nixie-title text-2xl">Nixie</h1>
                <div class="w-6"></div>
            </div>
        </header>

        <div id="chat" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-6"></div>

        <div class="p-6 md:p-10">
            <div class="max-w-3xl mx-auto flex items-end gap-3 bg-white/5 p-2 pr-3 rounded-2xl border border-white/5 focus-within:border-white/20 transition-all">
                <textarea id="input" rows="1" class="w-full p-3 bg-transparent outline-none resize-none text-base placeholder:text-white/20" placeholder="Ask Nixie..."></textarea>
                <button onclick="handleSend()" class="bg-white text-black px-6 py-2.5 rounded-xl font-bold transition-all active:scale-95 text-sm mb-1">
                    Sent
                </button>
            </div>
        </div>
    </main>

    <script>
        const $ = (id) => document.getElementById(id);
        let msgCount = 0;

        function toggleSide() { $('side').classList.toggle('-translate-x-full'); }

        function speakText(text) {
            if ($('voiceToggle').checked) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 1.1; 
                window.speechSynthesis.speak(msg);
            }
        }

        function appendMsg(role, text) {
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full fade-in`;
            wrap.innerHTML = `
                <div class="${role === 'user' ? 'user-bubble' : 'bot-bubble'} p-4 px-6 max-w-[85%] md:max-w-[70%]">
                    <p class="text-[15px] leading-relaxed">${text}</p>
                </div>
            `;
            $('chat').appendChild(wrap);
            $('chat').scrollTop = $('chat').scrollHeight;
            if (role === 'bot') speakText(text);
        }

        function handleSend() {
            const val = $('input').value.trim();
            const lower = val.toLowerCase();
            if (!val) return;

            appendMsg('user', val);
            $('input').value = '';
            msgCount++;

            setTimeout(() => {
                let reply = "";
                if (lower.includes("jarrar")) {
                    reply = "Jarrar mentioned 🦅🦅🔥";
                } else if (msgCount === 1) {
                    reply = "Do you bleed?";
                } else {
                    reply = Math.random() > 0.9 ? "Idc" : "Idk";
                }
                appendMsg('bot', reply);
            }, 600);
        }

        function initApp() {
            $('chat').innerHTML = '';
            msgCount = 0;
            setTimeout(() => {
                appendMsg('bot', "Hey I'm Nixie from Nepal , bhok tmkc");
            }, 400);
        }

        function newChat() {
            initApp();
            if(window.innerWidth < 768) toggleSide();
            $('input').focus();
        }

        $('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        window.onload = () => {
            setTimeout(() => {
                $('loading').style.opacity = '0';
                setTimeout(() => {
                    $('loading').style.display = 'none';
                    initApp();
                }, 500);
            }, 2000);
        };
    </script>
</body>
  </html>
