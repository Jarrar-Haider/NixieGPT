<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixieGPT v2.4 - NO REFRESH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <header class="p-4 bg-white border-b shadow-sm flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black text-blue-600">NixieGPT</h1>
        <div class="flex gap-2">
            <span id="key-status" class="text-xs self-center px-2 py-1 rounded bg-red-100 text-red-600 font-bold">KEY MISSING</span>
            <button onclick="document.getElementById('m').style.display='flex'" class="bg-gray-800 text-white p-2 px-4 rounded-xl text-sm font-bold">SET KEY</button>
        </div>
    </header>

    <main id="chat" class="p-4 max-w-2xl mx-auto space-y-4 pb-32 flex-1 w-full"></main>

    <div class="fixed bottom-0 w-full p-4 bg-white border-t">
        <form id="f" class="max-w-2xl mx-auto flex gap-2">
            <input type="text" id="i" placeholder="Type message here..." class="flex-1 p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" id="b" class="bg-blue-600 text-white px-8 rounded-2xl font-bold shadow-lg">SEND</button>
        </form>
    </div>

    <div id="m" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[1000] p-4">
        <div class="bg-white p-6 rounded-3xl w-full max-w-xs shadow-2xl">
            <h2 class="font-bold text-xl mb-4 text-center text-gray-800">API Setup</h2>
            <input type="password" id="k" class="w-full p-4 bg-gray-50 border rounded-2xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="sk-or-v1-...">
            <button id="save-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">SAVE KEY</button>
            <button onclick="document.getElementById('m').style.display='none'" class="w-full mt-2 text-gray-400 text-sm">Cancel</button>
        </div>
    </div>

    <script>
        // Use a variable in memory so it doesn't need to reload
        let SESSION_KEY = localStorage.getItem('nixie_key') || '';
        
        const chat = document.getElementById('chat');
        const status = document.getElementById('key-status');

        if(SESSION_KEY) {
            status.innerText = "KEY LOADED";
            status.className = "text-xs self-center px-2 py-1 rounded bg-green-100 text-green-600 font-bold";
        }

        function addMsg(role, text) {
            const d = document.createElement('div');
            d.className = `p-4 rounded-2xl shadow-sm ${role==='u'?'bg-blue-600 text-white ml-auto':'bg-white border text-gray-800 mr-auto'} max-w-[85%]`;
            d.innerHTML = marked.parse(text);
            chat.appendChild(d);
            window.scrollTo(0, document.body.scrollHeight);
            return d;
        }

        // SAVE BUTTON (DOES NOT REFRESH)
        document.getElementById('save-btn').onclick = () => {
            const inputKey = document.getElementById('k').value.trim();
            if(inputKey) {
                SESSION_KEY = inputKey;
                localStorage.setItem('nixie_key', inputKey);
                status.innerText = "KEY LOADED";
                status.className = "text-xs self-center px-2 py-1 rounded bg-green-100 text-green-600 font-bold";
                document.getElementById('m').style.display = 'none';
                alert("Key Saved! You can chat now without refreshing.");
            }
        };

        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            const val = document.getElementById('i').value.trim();
            if(!val) return;
            if(!SESSION_KEY) return alert("Please click SET KEY first!");

            addMsg('u', val);
            document.getElementById('i').value = '';
            document.getElementById('b').disabled = true;
            const ai = addMsg('a', 'Thinking...');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + SESSION_KEY.replace(/\s/g, ''),
                        "HTTP-Referer": window.location.origin,
                        "X-Title": "NixieGPT"
                    },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-lite-preview-02-05:free",
                        messages: [{role: "user", content: val}]
                    })
                });

                const data = await response.json();
                if(data.error) {
                    ai.innerHTML = `<b class="text-red-600">Error ${data.error.code}:</b> ${data.error.message}`;
                } else {
                    ai.innerHTML = marked.parse(data.choices[0].message.content);
                }
            } catch (err) {
                ai.innerText = "Connection Error. Check your internet.";
            } finally {
                document.getElementById('b').disabled = false;
            }
        };
    </script>
</body>
</html>
