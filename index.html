<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NixieGPT</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { margin:0; font-family: sans-serif; }
#loading {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#fff; z-index:50;
}
#app { display:none; height:100vh; }
</style>
</head>
<body>

<div id="loading">Loading NixieGPT...</div>

<div id="app" class="flex">

<!-- Sidebar -->
<div class="w-64 bg-gray-100 border-r flex flex-col">
<button id="newChat" class="m-2 p-2 bg-black text-white rounded">New Chat</button>
<div id="chats" class="flex-1 overflow-y-auto"></div>
</div>

<!-- Main -->
<div class="flex flex-col flex-1">

<div id="messages" class="flex-1 p-4 overflow-y-auto flex flex-col"></div>

<div class="p-3 border-t flex">
<input id="input" class="flex-1 border p-2 rounded" placeholder="Message NixieGPT..." />
<button id="send" class="ml-2 bg-blue-600 text-white px-4 rounded">Send</button>
</div>

</div>

</div>

<script>
let chats = [];
let activeChat = null;

function init(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  createChat();
}

function createChat(){
  const chat = {id:Date.now(), messages:[]};
  chats.push(chat);
  activeChat = chat;
  renderChats();
  renderMessages();
}

function renderChats(){
  const container = document.getElementById('chats');
  container.innerHTML='';
  chats.forEach(c=>{
    const div=document.createElement('div');
    div.className='p-2 cursor-pointer hover:bg-gray-200';
    div.innerText='Chat '+c.id;
    div.onclick=()=>{activeChat=c; renderMessages();};
    container.appendChild(div);
  });
}

function renderMessages(){
  const box=document.getElementById('messages');
  box.innerHTML='';
  activeChat.messages.forEach(m=>{
    const div=document.createElement('div');
    div.className='max-w-[70%] p-2 m-1 rounded ' + 
      (m.role==='user' ? 'bg-blue-500 text-white self-end' : 'bg-gray-200 self-start');
    div.innerText=m.text;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

function send(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text) return;

  activeChat.messages.push({role:'user',text});
  renderMessages();

  input.value='';

  setTimeout(()=>{
    activeChat.messages.push({role:'ai',text:'AI: '+text});
    renderMessages();
  },500);
}

document.getElementById('send').onclick=send;
document.getElementById('input').addEventListener('keypress',e=>{
  if(e.key==='Enter') send();
});
document.getElementById('newChat').onclick=createChat;

window.addEventListener('DOMContentLoaded',init);
</script>

</body>
</html>
