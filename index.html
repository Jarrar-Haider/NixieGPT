<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NixieGPT v2.7</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-xl bg-white rounded-3xl shadow-2xl flex flex-col h-[90vh] overflow-hidden">

    <div class="p-5 bg-blue-600 text-white flex justify-between items-center">
        <h1 class="font-black text-2xl">NIXIEGPT</h1>
        <div id="lock-icon">🔒</div>
    </div>

    <div class="p-4 bg-yellow-50 border-b flex gap-2">
        <input id="api-input" placeholder="Paste OpenRouter key"
            class="flex-1 p-3 border rounded-xl">
        <button onclick="forceActivate()"
            class="bg-yellow-500 px-6 rounded-xl text-white font-bold">
            ACTIVATE
        </button>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="text-center text-gray-400 mt-20">Waiting for activation...</div>
    </div>

    <form id="msg-form" class="p-4 flex gap-2">
        <input id="user-msg" class="flex-1 p-4 bg-gray-100 rounded-2xl"
            placeholder="Type message...">
        <button id="send-btn" class="bg-blue-600 text-white px-6 rounded-2xl">
            SEND
        </button>
    </form>

</div>

<script>
let KEY = localStorage.getItem("nx_key") || "";

if(KEY){
    document.getElementById("api-input").value = KEY;
    document.getElementById("lock-icon").innerText = "🔓";
}

function cleanKey(k){
    return k.replace(/[\s\u200B-\u200D\uFEFF]/g, "");
}

function forceActivate(){
    KEY = cleanKey(document.getElementById("api-input").value);
    localStorage.setItem("nx_key", KEY);
    document.getElementById("lock-icon").innerText = "🔓";
    alert("Key Saved!");
}

async function askAI(text){
    // Try direct OpenRouter first
    try {
        let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "google/gemini-2.0-flash-lite-preview-02-05:free",
                messages: [{ role: "user", content: text }]
            })
        });

        if(res.ok){
            let data = await res.json();
            return data.choices[0].message.content;
        }

    } catch(e){}

    // Fallback proxy (works even if CORS fails)
    let res2 = await fetch("https://api.allorigins.win/raw?url=" +
        encodeURIComponent("https://openrouter.ai/api/v1/chat/completions"), {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            model: "google/gemini-2.0-flash-lite-preview-02-05:free",
            messages: [{ role: "user", content: text }]
        })
    });

    let data2 = await res2.json();
    return data2.choices?.[0]?.message?.content || "Error";
}

document.getElementById("msg-form").onsubmit = async (e)=>{
    e.preventDefault();

    const text = document.getElementById("user-msg").value.trim();
    if(!text || !KEY) return alert("Activate key first");

    const chat = document.getElementById("chat-box");
    const btn = document.getElementById("send-btn");

    btn.disabled = true;

    const user = document.createElement("div");
    user.className = "bg-blue-600 text-white p-4 rounded-2xl ml-auto max-w-[80%]";
    user.innerText = text;
    chat.appendChild(user);

    const ai = document.createElement("div");
    ai.className = "bg-gray-100 p-4 rounded-2xl max-w-[80%]";
    ai.innerText = "Thinking...";
    chat.appendChild(ai);

    chat.scrollTop = chat.scrollHeight;

    try {
        const reply = await askAI(text);
        ai.innerHTML = marked.parse(reply);
    } catch(err){
        ai.innerHTML = "<span class='text-red-500'>Error</span>";
    }

    btn.disabled = false;
};
</script>

</body>
</html>
