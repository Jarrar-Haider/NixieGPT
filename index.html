<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NixieGPT Pro | v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --accent: #ff1e56; --accent-glow: rgba(255, 30, 86, 0.3); }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #05070a; 
            color: #f8fafc; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Ultimate Shimmer Title */
        .nixie-title {
            background: linear-gradient(135deg, var(--accent) 0%, #0044ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.05em;
            filter: drop-shadow(0 2px 10px var(--accent-glow));
        }

        /* Loading Screen */
        #loading { 
            position: fixed; inset: 0; background: #05070a; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .load-pill {
            width: 180px; height: 2px; background: rgba(255,255,255,0.03);
            border-radius: 10px; overflow: hidden; position: relative; margin-top: 2rem;
        }
        .load-pill::after {
            content: ''; position: absolute; left: 0; top: 0; height: 100%;
            width: 50%; background: linear-gradient(90deg, var(--accent), #0044ff);
            border-radius: 10px; animation: move 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes move { 0% { left: -50%; } 100% { left: 150%; } }

        /* Layout & Components */
        .glass-sidebar { background: #080a0f; border-right: 1px solid rgba(255,255,255,0.04); }
        .bot-bubble { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px 20px 20px 4px; 
        }
        .user-bubble { 
            background: linear-gradient(135deg, #0044ff, #002288); 
            border-radius: 20px 20px 4px 20px; 
            box-shadow: 0 8px 25px rgba(0, 68, 255, 0.15);
        }

        /* Typing Dots */
        .typing-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: blink 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

        .fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <div id="loading">
        <h2 class="nixie-title text-5xl mb-2 tracking-tighter">NixieGPT</h2>
        <div class="load-pill"></div>
    </div>

    <aside id="side" class="fixed md:sticky top-0 left-0 h-screen w-80 glass-sidebar z-50 transition-transform -translate-x-full md:translate-x-0 flex flex-col">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-3xl nixie-title">NixieGPT</h1>
            <p class="text-[9px] text-white/20 font-bold tracking-[0.3em] mt-2">v7.0_STABLE_RELEASE</p>
        </div>
        
        <div class="p-5 flex-1 overflow-y-auto space-y-6">
            <button onclick="newChat()" class="w-full py-4 bg-white/[0.03] hover:bg-white/[0.06] text-white rounded-xl transition-all border border-white/5 text-[11px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95">
                New Conversation
            </button>
            
            <div id="history-section" class="hidden">
                <div class="px-2 text-[10px] uppercase tracking-widest text-white/30 font-bold mb-3">Session Topic</div>
                <div id="session-chip" class="p-4 bg-white/[0.02] border border-white/5 rounded-xl text-xs text-white/50 truncate"></div>
            </div>
        </div>

        <div class="p-8 border-t border-white/5 bg-black/20">
            <div class="flex items-center justify-between mb-6">
                <div class="flex flex-col">
                    <span class="text-[11px] font-semibold">Voice Response</span>
                    <span class="text-[9px] text-white/20">Synthesize AI Replies</span>
                </div>
                <input type="checkbox" id="voiceToggle" class="hidden peer">
                <div class="w-10 h-5 bg-white/5 rounded-full relative peer-checked:bg-[#ff1e56] transition-all cursor-pointer" onclick="$('voiceToggle').click()">
                    <div class="absolute top-1 left-1 w-3 h-3 bg-white rounded-full transition-all peer-checked:left-6"></div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]"></div>
                <span class="text-[9px] mono opacity-30 tracking-tighter uppercase">Cloud_Local_Hybrid_Active</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative bg-[#05070a]">
        <header class="p-5 md:hidden border-b border-white/5 bg-[#05070a] flex justify-between items-center">
            <button onclick="toggleSide()" class="text-xl">☰</button>
            <h1 class="nixie-title text-2xl">NixieGPT</h1>
            <div class="w-6"></div>
        </header>

        <div id="chat" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 pb-32"></div>

        <div id="typing" class="px-12 py-4 absolute bottom-28 left-0 hidden">
            <div class="flex gap-1.5">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <div class="p-6 md:p-10 bg-gradient-to-t from-[#05070a] via-[#05070a] to-transparent">
            <div class="max-w-3xl mx-auto flex items-end gap-4 bg-white/[0.03] p-2 pr-4 rounded-2xl border border-white/5 focus-within:border-white/10 transition-all shadow-2xl backdrop-blur-md">
                <textarea id="input" rows="1" class="w-full p-4 bg-transparent outline-none resize-none text-[15px] placeholder:text-white/10" placeholder="Ask NixieGPT..."></textarea>
                <button onclick="handleSend()" class="bg-white text-black px-8 py-3 rounded-xl font-bold transition-all active:scale-95 text-[11px] tracking-widest mb-1 hover:bg-gray-200">
                    SENT
                </button>
            </div>
        </div>
    </main>

    <script>
        const $ = (id) => document.getElementById(id);
        let msgCount = 0;

        function toggleSide() { $('side').classList.toggle('-translate-x-full'); }

        function speakText(text) {
            if ($('voiceToggle').checked) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 1.05; 
                window.speechSynthesis.speak(msg);
            }
        }

        function appendMsg(role, text) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full fade-up`;
            
            wrap.innerHTML = `
                <div class="${role === 'user' ? 'user-bubble' : 'bot-bubble'} p-5 px-7 max-w-[85%] md:max-w-[70%] group relative">
                    <p class="text-[15px] leading-relaxed text-white/90">${text}</p>
                    <div class="flex justify-between items-center mt-3 opacity-20 mono text-[9px] font-bold">
                        <span>${role === 'user' ? 'USER' : 'NIXIE'}</span>
                        <span>${time}</span>
                    </div>
                </div>
            `;
            $('chat').appendChild(wrap);
            $('chat').scrollTo({ top: $('chat').scrollHeight, behavior: 'smooth' });
            if (role === 'bot') speakText(text);
        }

        function handleSend() {
            const val = $('input').value.trim();
            const lower = val.toLowerCase();
            if (!val) return;

            appendMsg('user', val);
            $('input').value = '';
            msgCount++;

            // Dynamic Sidebar History
            if(msgCount === 1) {
                $('history-section').classList.remove('hidden');
                $('session-chip').innerText = val;
            }

            $('typing').classList.remove('hidden');

            setTimeout(() => {
                $('typing').classList.add('hidden');
                let reply = "";
                
                if (lower.includes("jarrar")) {
                    reply = "Jarrar mentioned 🦅🦅🔥";
                } else if (msgCount === 1) {
                    reply = "Do you bleed?";
                } else {
                    // 90% Idk, 10% Idc
                    reply = Math.random() > 0.9 ? "Idc" : "Idk";
                }
                appendMsg('bot', reply);
            }, 1000);
        }

        function initApp() {
            $('chat').innerHTML = '';
            $('history-section').classList.add('hidden');
            msgCount = 0;
            setTimeout(() => {
                appendMsg('bot', "Hey I'm Nixie from Nepal , bhok tmkc");
            }, 600);
        }

        function newChat() {
            initApp();
            if(window.innerWidth < 768) toggleSide();
            $('input').focus();
        }

        $('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Smart Resize for Textarea
        $('input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        window.onload = () => {
            setTimeout(() => {
                $('loading').style.opacity = '0';
                setTimeout(() => {
                    $('loading').style.display = 'none';
                    initApp();
                }, 600);
            }, 2500);
        };
    </script>
</body>
</html>
