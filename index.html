<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixieGPT</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(30, 31, 32, 0.8); }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .cursor::after { content: '▋'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-[#f0f4f9] dark:bg-[#131314] text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

    <div id="loader">
        <p class="font-bold text-blue-600 animate-pulse">Bismillah... Loading NixieGPT</p>
    </div>

    <header class="p-4 flex justify-between items-center glass sticky top-0 z-10 border-b border-gray-200 dark:border-gray-700">
        <h1 class="text-xl font-bold tracking-tight text-blue-600">NixieGPT</h1>
        <button id="open-settings" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full">⚙️ Settings</button>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6 max-w-4xl mx-auto w-full pb-32">
        <div id="welcome-msg" class="text-center py-20">
            <h2 class="text-3xl font-bold opacity-20">How can I help you today?</h2>
            <p class="opacity-40">Please ensure your API Key is set in Settings.</p>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 glass border-t border-gray-200 dark:border-gray-700">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" autocomplete="off" placeholder="Message NixieGPT..." class="flex-1 p-4 rounded-2xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-[#1e1f20] focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-2xl font-bold hover:bg-blue-700 disabled:bg-gray-400">Send</button>
        </form>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white dark:bg-[#1e1f20] p-6 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Setup NixieGPT</h2>
            <label class="block mb-2 text-sm">OpenRouter API Key:</label>
            <input type="password" id="api-key-input" class="w-full p-3 rounded-xl border mb-4 dark:bg-gray-800 border-gray-600" placeholder="sk-or-v1-...">
            <div class="flex justify-end gap-2">
                <button id="close-modal" class="px-4 py-2">Cancel</button>
                <button id="save-settings" class="px-6 py-2 bg-blue-600 text-white rounded-xl font-bold">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // 1. DATA STORAGE
        const state = {
            key: localStorage.getItem('nixie_key') || '',
            history: []
        };

        // 2. DOM ELEMENTS
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modal = document.getElementById('modal');

        // 3. ACTIONS
        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl max-w-[85%] ${role === 'user' ? 'bg-blue-600 text-white ml-auto' : 'bg-gray-200 dark:bg-[#1e1f20] text-gray-900 dark:text-gray-100 mr-auto'}`;
            if (role === 'ai') div.id = 'latest-ai-msg';
            div.innerHTML = role === 'user' ? text : marked.parse(text);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        // 4. THE CORE BRAIN (Fixed Echo & Loading)
        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            
            if (!message) return;
            if (!state.key) {
                alert("Please add your API Key in Settings first!");
                modal.classList.replace('hidden', 'flex');
                return;
            }

            // UI FIX: Clear immediately, disable button (Prevents Echo)
            document.getElementById('welcome-msg')?.remove();
            appendMessage('user', message);
            userInput.value = ''; 
            sendBtn.disabled = true;

            const aiBubble = appendMessage('ai', 'Thinking...');
            aiBubble.classList.add('cursor');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "deepseek/deepseek-r1:free",
                        messages: [{ role: "user", content: message }]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    aiBubble.innerHTML = marked.parse(reply);
                } else {
                    aiBubble.innerText = "Error: API returned no data. Check your key.";
                }
            } catch (err) {
                aiBubble.innerText = "Connection failed. Are you offline?";
            } finally {
                aiBubble.classList.remove('cursor');
                sendBtn.disabled = false;
            }
        };

        // 5. MODAL LOGIC
        document.getElementById('open-settings').onclick = () => modal.classList.replace('hidden', 'flex');
        document.getElementById('close-modal').onclick = () => modal.classList.replace('flex', 'hidden');
        document.getElementById('save-settings').onclick = () => {
            state.key = document.getElementById('api-key-input').value.trim();
            localStorage.setItem('nixie_key', state.key);
            modal.classList.replace('flex', 'hidden');
        };

        // 6. STARTUP (The Fix for the "Stuck Loading" Screen)
        window.onload = () => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);
            if (state.key) document.getElementById('api-key-input').value = state.key;
        };
    </script>
</body>
</html>
