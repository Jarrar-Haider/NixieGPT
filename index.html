<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixieGPT v2.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-white rounded-3xl shadow-2xl flex flex-col h-[90vh] overflow-hidden">
        <div class="p-5 bg-blue-600 text-white flex justify-between items-center">
            <h1 class="font-black text-2xl">NIXIEGPT</h1>
            <div id="lock-icon" class="text-xl">🔒</div>
        </div>

        <div class="p-4 bg-yellow-50 border-b flex flex-col gap-2">
            <p class="text-[10px] font-bold text-yellow-600 uppercase">Paste OpenRouter Key below (Starts with sk-or-v1-):</p>
            <div class="flex gap-2">
                <input type="text" id="api-input" placeholder="Paste key here..." class="flex-1 p-3 text-sm border-2 border-yellow-200 rounded-xl outline-none focus:border-yellow-400">
                <button onclick="forceActivate()" class="bg-yellow-500 text-white px-6 py-2 rounded-xl font-bold hover:bg-yellow-600">ACTIVATE</button>
            </div>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="text-center text-gray-300 mt-20">Waiting for activation...</div>
        </div>

        <form id="msg-form" class="p-4 bg-white border-t flex gap-2">
            <input type="text" id="user-msg" placeholder="Type a message..." class="flex-1 p-4 bg-gray-100 rounded-2xl outline-none border-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" id="send-btn" class="bg-blue-600 text-white px-8 rounded-2xl font-bold shadow-lg disabled:opacity-50">SEND</button>
        </form>
    </div>

    <script>
        let SAVED_KEY = localStorage.getItem('nx_key') || '';
        if(SAVED_KEY) {
            document.getElementById('api-input').value = SAVED_KEY;
            document.getElementById('lock-icon').innerText = "🔓";
        }

        function forceActivate() {
            const raw = document.getElementById('api-input').value.trim();
            if(!raw) return alert("Box is empty!");
            
            // This version does NOT check the format. It just saves it.
            SAVED_KEY = raw.replace(/\s/g, ''); 
            localStorage.setItem('nx_key', SAVED_KEY);
            document.getElementById('lock-icon').innerText = "🔓";
            alert("Key Saved! Try sending a message now.");
            document.getElementById('chat-box').innerHTML = '<div class="text-center text-green-500 font-bold">✅ System Online</div>';
        }

        document.getElementById('msg-form').onsubmit = async (e) => {
            e.preventDefault();
            const text = document.getElementById('user-msg').value.trim();
            if(!text || !SAVED_KEY) return alert("Paste your key and click ACTIVATE first!");

            // Add User Bubble
            const u = document.createElement('div');
            u.className = "bg-blue-600 text-white p-4 rounded-2xl ml-auto max-w-[80%] shadow-md";
            u.innerText = text;
            document.getElementById('chat-box').appendChild(u);
            document.getElementById('user-msg').value = '';
