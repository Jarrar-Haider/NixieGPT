<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixieGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        .chat-bubble { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <div id="loader">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 font-bold text-blue-600">Starting NixieGPT...</p>
        </div>
    </div>

    <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <h1 class="text-2xl font-black text-blue-600 tracking-tighter">NIXIEGPT</h1>
        <button id="open-settings" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg font-medium">⚙️ Settings</button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-3xl mx-auto w-full pb-32">
        <div id="setup-notice" class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mt-10">
            <p class="text-yellow-700 font-bold">Step 1: Click Settings and paste your API Key!</p>
            <p class="text-yellow-600 text-sm">Get a free key at openrouter.ai</p>
        </div>
    </main>

    <div class="fixed bottom-0 w-full bg-white border-t p-4 shadow-lg">
        <form id="chat-form" class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Ask NixieGPT anything..." class="flex-1 p-4 bg-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 border-none">
            <button type="submit" id="send-btn" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-blue-700 transition disabled:opacity-50">SEND</button>
        </form>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-2">API Settings</h2>
            <p class="text-gray-500 mb-6 text-sm">Your key is saved locally in your browser only.</p>
            <input type="password" id="api-key-box" class="w-full p-4 bg-gray-100 rounded-xl mb-6 border" placeholder="sk-or-v1-...">
            <div class="flex gap-2">
                <button id="close-settings" class="flex-1 py-3 text-gray-500 font-bold">Cancel</button>
                <button id="save-key" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200">Save Key</button>
            </div>
        </div>
    </div>

    <script>
        // 1. STATE MANAGEMENT
        let apiKey = localStorage.getItem('nixie_key') || '';
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const settingsModal = document.getElementById('settings-modal');

        // 2. LOAD KEY INTO BOX
        if(apiKey) {
            document.getElementById('api-key-box').value = apiKey;
            document.getElementById('setup-notice').innerHTML = "<p class='text-green-700 font-bold text-center'>✅ Ready! Type a message below.</p>";
        }

        // 3. UI FUNCTIONS
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `chat-bubble p-4 rounded-2xl max-w-[90%] ${role === 'user' ? 'bg-blue-600 text-white ml-auto' : 'bg-gray-200 text-gray-800'}`;
            div.innerHTML = role === 'user' ? content : marked.parse(content);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // 4. THE BRAIN (THE FIX IS HERE)
        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            
            if (!text) return;
            if (!apiKey) {
                alert("Please add your API Key in Settings!");
                settingsModal.classList.replace('hidden', 'flex');
                return;
            }

            // Clear Input & Disable Button (Prevents the 'Echo' problem)
            document.getElementById('setup-notice')?.remove();
            addMessage('user', text);
            userInput.value = '';
            sendBtn.disabled = true;

            const aiBubble = addMessage('ai', '...');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        // Using Gemini Flash Lite: Fast, Free, and Very Stable
                        model: "google/gemini-2.0-flash-lite-preview-02-05:free",
                        messages: [{ role: "user", content: text }]
                    })
                });

                const result = await response.json();
                
                if (result.error) {
                    aiBubble.innerHTML = `<span class="text-red-500 font-bold">API Error: ${result.error.message}</span>`;
                } else if (result.choices && result.choices[0]) {
                    const aiText = result.choices[0].message.content;
                    aiBubble.innerHTML = marked.parse(aiText);
                } else {
                    aiBubble.innerText = "No response from AI. Try again in 5 seconds.";
                }
            } catch (err) {
                aiBubble.innerText = "Connection Error. Check your internet.";
            } finally {
                sendBtn.disabled = false;
            }
        };

        // 5. SETTINGS ACTIONS
        document.getElementById('open-settings').onclick = () => settingsModal.classList.replace('hidden', 'flex');
        document.getElementById('close-settings').onclick = () => settingsModal.classList.replace('flex', 'hidden');
        document.getElementById('save-key').onclick = () => {
            const newKey = document.getElementById('api-key-box').value.trim();
            if(newKey) {
                localStorage.setItem('nixie_key', newKey);
                apiKey = newKey;
                alert("Settings Saved!");
                location.reload(); // Reload ensures the key is active
            }
        };

        // 6. KILL LOADER
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 500);
        };
    </script>
</body>
</html>
