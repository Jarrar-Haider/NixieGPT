<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NixieGPT</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        #loading { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        html.dark #loading { background: #111827; color: #fff; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-left-color: #DC143C; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .nepal-title { color: #DC143C; -webkit-text-stroke: 0.5px #003893; text-shadow: 2px 2px 0px #003893; font-weight: 900; }
        .typing::after { content: '▋'; animation: blink 1s step-end infinite; color: #3b82f6; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (JSON.parse(localStorage.getItem('nixie_st'))?.dark !== false) document.documentElement.classList.add('dark');
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen flex flex-col md:flex-row overflow-x-hidden">
    <div id="loading"><div class="spinner mb-4"></div><h2 class="nepal-title text-xl">NixieGPT</h2></div>

    <aside id="side" class="fixed md:sticky top-0 left-0 h-screen w-72 bg-white dark:bg-gray-950 border-r border-gray-200 dark:border-gray-800 z-50 transition-transform -translate-x-full md:translate-x-0 flex flex-col">
        <div class="p-4 flex justify-between items-center"><h1 class="text-2xl nepal-title">NixieGPT</h1><button onclick="toggleSide()" class="md:hidden text-2xl">✕</button></div>
        <button onclick="newChat()" class="m-4 p-3 border border-gray-300 dark:border-gray-700 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition">+ New Chat</button>
        <div id="history" class="flex-1 overflow-y-auto px-4 space-y-2"></div>
        <div class="p-4 border-t border-gray-800 flex gap-2">
            <button onclick="openSet()" class="flex-1 p-2 bg-gray-100 dark:bg-gray-800 rounded-lg text-sm">Settings</button>
            <button onclick="toggleDark()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-lg">🌙</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="p-4 border-b border-gray-200 dark:border-gray-800 md:hidden flex items-center">
            <button onclick="toggleSide()" class="text-2xl mr-4">☰</button>
            <h1 class="nepal-title">NixieGPT</h1>
        </header>
        <div id="chat" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32"></div>
        <div class="absolute bottom-0 w-full p-4 bg-gradient-to-t from-gray-50 dark:from-gray-900">
            <div class="max-w-3xl mx-auto flex gap-2 bg-white dark:bg-gray-800 p-2 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700">
                <textarea id="input" rows="1" class="flex-1 p-2 bg-transparent outline-none resize-none" placeholder="Ask NixieGPT..."></textarea>
                <button id="send" onclick="send()" class="bg-blue-600 text-white px-4 py-2 rounded-xl">Send</button>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Settings</h2>
            <input id="key" type="password" placeholder="OpenRouter API Key" class="w-full p-3 mb-4 border rounded-xl dark:bg-gray-800 border-gray-700">
            <input id="mod" type="text" placeholder="Model (e.g. deepseek/deepseek-r1:free)" class="w-full p-3 mb-4 border rounded-xl dark:bg-gray-800 border-gray-700">
            <textarea id="sys" placeholder="System Prompt" class="w-full p-3 mb-4 border rounded-xl dark:bg-gray-800 border-gray-700 h-24"></textarea>
            <div class="flex justify-end gap-2"><button onclick="closeSet()" class="px-4 py-2">Cancel</button><button onclick="saveSet()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Save</button></div>
        </div>
    </div>

    <script>
        const state = {
            chats: JSON.parse(localStorage.getItem('nixie_ch')) || [],
            curId: null,
            st: JSON.parse(localStorage.getItem('nixie_st')) || { key: '', mod: 'deepseek/deepseek-r1:free', dark: true, sys: '' },
            busy: false
        };

        const $ = (id) => document.getElementById(id);
        
        function toggleDark() {
            state.st.dark = !state.st.dark;
            document.documentElement.classList.toggle('dark');
            saveSettings();
        }

        function saveSettings() { localStorage.setItem('nixie_st', JSON.stringify(state.st)); }
        function saveChats() { localStorage.setItem('nixie_ch', JSON.stringify(state.chats)); }

        function toggleSide() { $('side').classList.toggle('-translate-x-full'); }
        function openSet() { $('key').value = state.st.key; $('mod').value = state.st.mod; $('sys').value = state.st.sys; $('modal').classList.remove('hidden'); }
        function closeSet() { $('modal').classList.add('hidden'); }
        function saveSet() { state.st.key = $('key').value; state.st.mod = $('mod').value; state.st.sys = $('sys').value; saveSettings(); closeSet(); }

        function renderHistory() {
            $('history').innerHTML = state.chats.map(c => `
                <div onclick="loadChat('${c.id}')" class="p-3 rounded-lg cursor-pointer ${state.curId === c.id ? 'bg-blue-100 dark:bg-blue-900/30' : 'hover:bg-gray-100 dark:hover:bg-gray-800'} flex justify-between group">
                    <span class="truncate text-sm">${c.title}</span>
                    <button onclick="delChat('${c.id}', event)" class="hidden group-hover:block text-red-500 text-xs">Del</button>
                </div>
            `).join('');
        }

        function loadChat(id) {
            state.curId = id;
            const chat = state.chats.find(c => c.id === id);
            $('chat').innerHTML = chat.msgs.map(m => `
                <div class="${m.role === 'user' ? 'ml-auto bg-gray-200 dark:bg-gray-800' : 'mr-auto border border-gray-200 dark:border-gray-800'} p-4 rounded-2xl max-w-[85%] prose dark:prose-invert">
                    ${m.role === 'user' ? m.content : DOMPurify.sanitize(marked.parse(m.content))}
                </div>
            `).join('');
            renderHistory();
            $('chat').scrollTo(0, $('chat').scrollHeight);
        }

        function newChat() {
            const id = Date.now().toString();
            state.chats.push({ id, title: 'New Chat', msgs: [] });
            state.curId = id;
            saveChats();
            loadChat(id);
            if(window.innerWidth < 768) toggleSide();
        }

        function delChat(id, e) {
            e.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            state.curId = state.chats.length ? state.chats[0].id : null;
            saveChats();
            state.curId ? loadChat(state.curId) : $('chat').innerHTML = '';
            renderHistory();
        }

        async function send() {
            const val = $('input').value.trim();
            if (!val || state.busy || !state.st.key) return !state.st.key && openSet();
            
            if (!state.curId) newChat();
            const chat = state.chats.find(c => c.id === state.curId);
            chat.msgs.push({ role: 'user', content: val });
            if (chat.title === 'New Chat') chat.title = val.substring(0, 20);
            
            $('input').value = '';
            loadChat(state.curId);
            state.busy = true;

            const aiMsg = { role: 'assistant', content: '' };
            chat.msgs.push(aiMsg);
            const msgDiv = document.createElement('div');
            msgDiv.className = "mr-auto border border-gray-800 p-4 rounded-2xl max-w-[85%] prose dark:prose-invert typing";
            $('chat').appendChild(msgDiv);

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${state.st.key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: state.st.mod,
                        messages: state.st.sys ? [{role:'system',content:state.st.sys}, ...chat.msgs.slice(0,-1)] : chat.msgs.slice(0,-1),
                        stream: true
                    })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunks = decoder.decode(value).split('\n');
                    for (const chunk of chunks) {
                        if (chunk.startsWith('data: ')) {
                            const data = chunk.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const content = json.choices[0].delta.content || '';
                                aiMsg.content += content;
                                msgDiv.innerHTML = DOMPurify.sanitize(marked.parse(aiMsg.content));
                                $('chat').scrollTo(0, $('chat').scrollHeight);
                            } catch(e){}
                        }
                    }
                }
            } catch (err) { aiMsg.content = "Error: " + err.message; }
            
            msgDiv.classList.remove('typing');
            state.busy = false;
            saveChats();
        }

        window.onload = () => {
            if (state.chats.length) loadChat(state.chats[state.chats.length-1].id);
            renderHistory();
            $('loading').style.display = 'none';
        };
    </script>
</body>
  </html>
