<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixieGPT v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 2px solid #e2e8f0; }
        #app-loader { position: fixed; inset: 0; background: white; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .message-fade { animation: fadeInUp 0.3s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col m-0 p-0">

    <div id="app-loader">
        <div class="text-center">
            <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 font-bold text-gray-600">Bismillah... Launching NixieGPT</p>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-50 p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white p-2 rounded-lg font-black text-xl shadow-lg">N</div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">NixieGPT <span class="text-blue-600 text-xs uppercase ml-1">v2.0</span></h1>
        </div>
        <button id="open-settings" class="bg-gray-100 hover:bg-gray-200 p-2 px-4 rounded-xl font-bold transition">⚙️ Settings</button>
    </header>

    <main id="chat-feed" class="flex-1 overflow-y-auto p-4 space-y-6 max-w-3xl mx-auto w-full pb-36">
        <div id="start-guide" class="bg-blue-50 border-2 border-blue-100 p-6 rounded-3xl mt-10 text-center">
            <h3 class="text-blue-800 font-bold text-lg mb-2">Welcome to NixieGPT!</h3>
            <p class="text-blue-600 mb-4">To begin, click <b>Settings</b> and paste your OpenRouter API Key.</p>
            <div class="text-xs text-blue-400">If you see this box, the update is successful.</div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-gray-100">
        <form id="chat-form" class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="user-input" autocomplete="off" placeholder="Message NixieGPT..." class="flex-1 p-4 rounded-2xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 text-gray-800">
            <button type="submit" id="send-btn" class="bg-blue-600 text-white px-8 rounded-2xl font-bold hover:bg-blue-700 transition disabled:opacity-50 shadow-lg shadow-blue-200">SEND</button>
        </form>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[999] p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-black mb-2">API Setup</h2>
            <p class="text-gray-500 text-sm mb-4">Your key is stored only in this browser.</p>
            <input type="password" id="api-key-input" class="w-full p-4 bg-gray-50 border rounded-2xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="sk-or-v1-...">
            <div class="flex gap-2">
                <button id="close-modal" class="flex-1 py-3 font-bold text-gray-400">Cancel</button>
                <button id="save-settings" class="flex-1 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-md">Save Key</button>
            </div>
        </div>
    </div>

    <script>
        // Data Management
        let API_KEY = localStorage.getItem('nixie_key') || '';
        const feed = document.getElementById('chat-feed');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const modal = document.getElementById('modal');

        // Initial setup check
        if(API_KEY) {
            document.getElementById('api-key-input').value = API_KEY;
            document.getElementById('start-guide').innerHTML = "<p class='text-blue-800 font-bold'>✅ API Key Loaded. Ready to chat!</p>";
        }

        function createBubble(role, content) {
            const div = document.createElement('div');
            div.className = `message-fade p-4 rounded-2xl max-w-[85%] ${role === 'user' ? 'bg-blue-600 text-white ml-auto shadow-md' : 'bg-white border border-gray-100 text-gray-800 mr-auto shadow-sm'}`;
            div.innerHTML = role === 'user' ? content : marked.parse(content);
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
            return div;
        }

        // The "Brain" (Fixed logic)
        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            
            if (!text) return;
            if (!API_KEY) {
                alert("Please add your API Key in Settings!");
                modal.classList.replace('hidden', 'flex');
                return;
            }

            // UI Cleanup (Fixes "Echo" and "Loading" bugs)
            document.getElementById('start-guide')?.remove();
            createBubble('user', text);
            input.value = ''; // Clear text box instantly
            btn.disabled = true; // Stop double-clicking

            const aiDiv = createBubble('ai', 'Thinking...');

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        // Using a very stable free model
                        model: "google/gemini-2.0-flash-lite-preview-02-05:free",
                        messages: [{ role: "user", content: text }]
                    })
                });

                const data = await res.json();
                
                if (data.error) {
                    aiDiv.innerHTML = `<span class="text-red-500 font-bold">API Error: ${data.error.message}</span>`;
                } else if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    aiDiv.innerHTML = marked.parse(reply);
                } else {
                    aiDiv.innerText = "Empty response. Try again.";
                }
            } catch (err) {
                aiDiv.innerText = "Check your internet connection.";
            } finally {
                btn.disabled = false; // Re-enable button
            }
        };

        // UI Interactions
        document.getElementById('open-settings').onclick = () => modal.classList.replace('hidden', 'flex');
        document.getElementById('close-modal').onclick = () => modal.classList.replace('flex', 'hidden');
        document.getElementById('save-settings').onclick = () => {
            const val = document.getElementById('api-key-input').value.trim();
            if(val) {
                localStorage.setItem('nixie_key', val);
                API_KEY = val;
                alert("Key Saved Successfully!");
                location.reload(); // Hard refresh to ensure everything is fresh
            }
        };

        // Loading Screen Terminator
        window.onload = () => {
            const loader = document.getElementById('app-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
        };
    </script>
</body>
  </html>
